<!DOCTYPE html><html lang="ja">
<head>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モンハンワイルズ ランダムクエスト</title>
  <style>
    body {
      font-family: 'DotGothic16', cursive;
      background: linear-gradient(135deg, #334155, #64748b);
      color: #86efac;
      text-align: center;
      padding: 30px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
      padding: 20px;
      border-radius: 20px;
    }
    button {
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover {
      background: #b91c1c;
    }
    #result {
      text-shadow: 2px 2px 8px rgba(255, 200, 0, 0.7);
      font-size: 24px;
      margin: 20px 0;
      color: #86efac;
      text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
    }
    ul {
      list-style: none;
      padding: 0;
    }
    
    .flash-container {
      animation: flashCard 0.5s infinite;
    }

    @keyframes flashCard {
      0% {
        box-shadow: 0 0 10px transparent;
      }
      50% {
        box-shadow: 0 0 30px gold;
      }
      100% {
        box-shadow: 0 0 10px transparent;
      }
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ＭＨ：Ｗｉｌｄｓ⚔️
        <br>🎲ランダムクエスト🎲
    </h1>

    <div id="rareMessage" style="
      display:none;
      margin-bottom:15px;
      padding:10px;
      background:#facc15;
      color:#000;
      border-radius:10px;
      font-weight:bold;
    ">
      🔥 レアクエスト発生!! 🔥
    </div>

    <p id="result">クエストを決めよう！</p>
    <div>
      <button onclick="startRoulette()">スタート</button>
      <button onclick="stopRoulette()">ストップ</button>
    </div>
    
    <h2>履歴</h2>
    <ul id="history"></ul>
  </div>
  <script>
    const quests = [
      "歴戦王アルシュベルド",
      "★10 英雄の証", 
      "☆9  ゴグマジオス", 
      "★10 ゴグマジオス", 
      "歴戦王ウズ・トゥナ",
      "歴戦王レ・ダウ",
      "歴戦王ジン・ダハド討伐",
      "歴戦王ヌ・エグドラ",  
      "アンジャナフ", 
      "零式オメガ", 
      "ゾシア", 
      "ケマトリス", 
      "ゴア・マガラ",
      "タマミツネ",
      "ドシャグマ",
      "バーラハーラ",
      "ププロポル",
      "ププロポルは泣いてない", 
      "チャタカブラ",
      "セルレギオス",
      "ヒラバミ",
      "イャンクック"
    ];

    let history = [];
    let rouletteInterval = null;

    function updateHistory(selected) {
      history.unshift(selected);
      history = history.slice(0, 5);

      const historyList = document.getElementById("history");
      historyList.innerHTML = "";

      history.forEach(q => {
        const li = document.createElement("li");
        li.textContent = "• " + q;
        historyList.appendChild(li);
      });
    }

    function startRoulette() {
      if (rouletteInterval) return;

      rouletteInterval = setInterval(() => {
        const random = quests[Math.floor(Math.random() * quests.length)];
        document.getElementById("result").textContent = random;
      }, 100);
    }

    function stopRoulette() {
      if (!rouletteInterval) return;

      clearInterval(rouletteInterval);
      rouletteInterval = null;

      const selected = document.getElementById("result").textContent;

      const resultEl = document.getElementById("result");

      if (selected.includes("★10") || selected.includes("泣いてない")) {
        resultEl.style.color = "#facc15";
        resultEl.style.fontSize = "32px";
        document.getElementById("rareMessage").style.display = "block";
        setTimeout(() => {
          document.body.classList.remove("flash");
        }, 3000);
      } else {
        resultEl.style.color = "#86efac";
        resultEl.style.fontSize = "24px";
        document.getElementById("rareMessage").style.display = "none";
        document.body.classList.remove("flash");
      }
      updateHistory(selected);
    }
  </script>
  </body>
</html>
